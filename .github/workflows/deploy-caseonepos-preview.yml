name: Deploy CaseonePOS Web Preview

on:
  push:
    branches: [caseonepos-ios-app]
    paths:
      - 'web-preview/**'
      - '.github/workflows/deploy-caseonepos-preview.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload preview
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-preview
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
