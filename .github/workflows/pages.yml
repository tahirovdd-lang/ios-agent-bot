name: Deploy CaseonePOS Web Demo

on:
  push:
    branches:
      - caseonepos-ios-app
    paths:
      - 'index.html'
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CaseonePOS demo branch
        uses: actions/checkout@v4
        with:
          ref: caseonepos-ios-app

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare CaseonePOS site
        run: |
          set -e
          rm -rf _site
          mkdir -p _site
          test -f web/secure-demo.html
          test -f web/caseonepos-logo.b64
          cp web/secure-demo.html _site/index.html
          base64 --decode web/caseonepos-logo.b64 > _site/caseonepos-logo.jpg

          python3 - <<'PY'
          from pathlib import Path

          page = Path('_site/index.html')
          html = page.read_text(encoding='utf-8')

          html = html.replace(
              '<div class="login-logo">C1</div>',
              '<div class="login-logo"><img src="caseonepos-logo.jpg" alt="CaseonePOS"></div>',
          )
          html = html.replace(
              '<div class="logo">C1</div>',
              '<div class="logo"><img src="caseonepos-logo.jpg" alt="CaseonePOS"></div>',
          )
          html = html.replace(
              '</style>',
              '.login-logo,.logo{overflow:hidden}.login-logo img,.logo img{width:100%;height:100%;object-fit:contain;padding:4px}</style>',
              1,
          )

          page.write_text(html, encoding='utf-8')
          PY

          printf 'full-demo-logo-only-v7' > _site/version.txt
          touch _site/.nojekyll
          grep -q 'Выберите роль и введите PIN-код' _site/index.html
          grep -q 'caseonepos-logo.jpg' _site/index.html
          if grep -q '>C1<' _site/index.html; then exit 1; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
