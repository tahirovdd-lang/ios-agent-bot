name: Deploy CaseonePOS Web Demo

on:
  push:
    branches:
      - caseonepos-ios-app
    paths:
      - 'index.html'
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CaseonePOS demo branch
        uses: actions/checkout@v4
        with:
          ref: caseonepos-ios-app

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare CaseonePOS site
        run: |
          set -e
          rm -rf _site
          mkdir -p _site
          test -f web/secure-demo.html
          test -f web/caseonepos-logo.b64
          cp web/secure-demo.html _site/index.html
          base64 --decode web/caseonepos-logo.b64 > _site/caseonepos-logo.jpg

          python3 - <<'PY'
          from pathlib import Path
          import re

          page = Path('_site/index.html')
          html = page.read_text(encoding='utf-8')

          # Меняем только отметки C1 на настоящий логотип.
          html = html.replace(
              '<div class="login-logo">C1</div>',
              '<div class="login-logo"><img src="caseonepos-logo.jpg" alt="CaseonePOS"></div>',
          )
          html = html.replace(
              '<div class="logo">C1</div>',
              '<div class="logo"><img src="caseonepos-logo.jpg" alt="CaseonePOS"></div>',
          )

          extra_css = '''
          .login-logo,.logo{overflow:hidden}
          .login-logo img,.logo img{width:100%;height:100%;object-fit:contain;padding:4px}
          .report-list{display:flex;flex-direction:column;gap:9px}
          .report-item{width:100%;border:1px solid #e9f0ee;background:#fff;border-radius:16px;padding:15px;display:flex;align-items:center;gap:12px;text-align:left;color:#163b35;box-shadow:0 10px 24px #073f4712}
          .report-item .grow{font-size:14px;font-weight:700}
          .report-item .info{width:26px;height:26px;border:2px solid #67acd5;color:#4196ca;border-radius:50%;display:grid;place-items:center;font-weight:900;font-size:14px}
          .report-item .arrow{font-size:23px;color:#8aa5a0}
          .simple-panel{background:#fff;border:1px solid #e9f0ee;border-radius:19px;padding:18px;box-shadow:0 10px 24px #073f4712;margin-bottom:12px}
          '''
          html = html.replace('</style>', extra_css + '</style>', 1)

          new_sections = '''
          <section id="reports" class="screen director-screen">
            <div class="title"><h2>Отчёты</h2></div>
            <div class="report-list">
              <button class="report-item" onclick="toast('Выручка по официантам')"><span class="grow">Выручка по официантам</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Выручка по кассам и типам оплат')"><span class="grow">Выручка по кассам и типам оплат</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Выручка по залам')"><span class="grow">Выручка по залам</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Выручка по столам')"><span class="grow">Выручка по столам</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Заказы')"><span class="grow">Заказы</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Продажи блюд по группам')"><span class="grow">Продажи блюд по группам</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Продажи по часам')"><span class="grow">Продажи по часам</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Продажи по категориям')"><span class="grow">Продажи по категориям</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Отчёт о прибылях и убытках')"><span class="grow">Отчёт о прибылях и убытках</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Наличность в кассах')"><span class="grow">Наличность в кассах</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Контроль себестоимости блюд')"><span class="grow">Контроль себестоимости блюд</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Приходы от поставщиков')"><span class="grow">Приходы от поставщиков</span><span class="info">i</span><span class="arrow">›</span></button>
              <button class="report-item" onclick="toast('Анализ закупочных цен')"><span class="grow">Анализ закупочных цен по поставщикам</span><span class="info">i</span><span class="arrow">›</span></button>
            </div>
          </section>
          <section id="extensions" class="screen director-screen">
            <div class="title"><h2>Расширения</h2></div>
            <div class="simple-panel"><h3>Дополнительные модули</h3><p>Подключение интеграций и дополнительных возможностей CaseonePOS.</p></div>
          </section>
          <section id="settings" class="screen director-screen">
            <div class="title"><h2>Настройки</h2></div>
            <div class="simple-panel"><h3>Настройки приложения</h3><p>Параметры заведения, сотрудников, ролей и уведомлений.</p></div>
          </section>
          '''
          if 'id="reports"' not in html:
              html = html.replace('</main>', new_sections + '</main>', 1)

          new_nav = '''<nav id="directorNav" class="bottom">
            <button class="active" onclick="showScreen('indicators',this)"><b>▥</b><span>Показатели</span></button>
            <button onclick="showScreen('ratings',this)"><b>★</b><span>Рейтинги</span></button>
            <button onclick="showScreen('reports',this)"><b>▦</b><span>Отчёты</span></button>
            <button onclick="showScreen('extensions',this)"><b>➤</b><span>Расширения</span></button>
            <button onclick="showScreen('settings',this)"><b>⚙</b><span>Настройки</span></button>
          </nav>'''
          html, count = re.subn(r'<nav id="directorNav"[^>]*>.*?</nav>', new_nav, html, count=1, flags=re.S)
          if count == 0:
              html, count = re.subn(r'<div id="directorNav"[^>]*>.*?</div>', new_nav, html, count=1, flags=re.S)
          if count == 0:
              raise SystemExit('Director navigation was not found')

          page.write_text(html, encoding='utf-8')
          PY

          printf 'restored-five-tabs-v8' > _site/version.txt
          touch _site/.nojekyll
          grep -q 'Показатели' _site/index.html
          grep -q 'Рейтинги' _site/index.html
          grep -q 'Отчёты' _site/index.html
          grep -q 'Расширения' _site/index.html
          grep -q 'Настройки' _site/index.html
          grep -q 'caseonepos-logo.jpg' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
