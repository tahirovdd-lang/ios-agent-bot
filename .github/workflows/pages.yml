name: Deploy CaseonePOS Web Demo

on:
  push:
    branches:
      - caseonepos-ios-app
    paths:
      - 'index.html'
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout role-based demo branch
        uses: actions/checkout@v4
        with:
          ref: caseonepos-ios-app

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare protected CaseonePOS site
        run: |
          set -e
          rm -rf _site
          mkdir -p _site
          test -f web/secure-demo.html
          cp web/secure-demo.html _site/index.html

          # Убираем отображение роли из шапки, не меняя дизайн и цвета.
          sed -i 's#\.role{font-size:11px;#.role{display:none;font-size:11px;#' _site/index.html
          sed -i 's#<div class="pill">Официант<br><b>Алишер</b></div>#<div class="pill"><b>Алишер</b></div>#' _site/index.html

          # Повышаем читаемость подписей нижнего меню без изменения цвета.
          sed -i 's#\.bottom span{font-size:9px}#.bottom span{font-size:9px;font-weight:600}#' _site/index.html

          printf 'role-header-nav-v4' > _site/version.txt
          touch _site/.nojekyll
          grep -q 'Выберите роль и введите PIN-код' _site/index.html
          grep -q '.role{display:none' _site/index.html
          grep -q '.bottom span{font-size:9px;font-weight:600}' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
